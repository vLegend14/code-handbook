name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"          # solo se dispara cuando cambias la web
  workflow_dispatch:      # también permite ejecutarlo manualmente

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build Astro
        working-directory: web
        env:
          # URL del backend en Railway — guárdala como secret en GitHub
          PUBLIC_API_URL: ${{ secrets.RAILWAY_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
